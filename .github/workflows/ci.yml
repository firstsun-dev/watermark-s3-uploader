name: CI/CD

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

jobs:
  filter:
    name: Check for Code Changes
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'esbuild.config.mjs'
              - 'eslint.config.mts'
              - 'vitest.config.ts'
              - 'styles.css'
              - 'main.js'

  lint:
    name: Lint
    needs: filter
    if: needs.filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    needs: filter
    if: needs.filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test -- --coverage
      - id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  sonar:
    name: SonarQube
    needs: [filter, test]
    if: (needs.filter.outputs.code == 'true') && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
      - name: Upload Sonar logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-scan-logs
          path: |
            .scannerwork/
            sonar-project.properties

  artifact:
    name: Package Artifact
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    permissions:
      contents: read
    needs: [filter, test]
    if: needs.filter.outputs.code == 'true' && (github.event_name == 'pull_request' || (github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Create plugin package
        run: |
          VERSION=${{ needs.test.outputs.version }}
          BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          BRANCH_NAME_SAFE=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
          ZIP_NAME="watermark-s3-uploader-${VERSION}-${BRANCH_NAME_SAFE}.zip"
          zip -j "$ZIP_NAME" main.js manifest.json styles.css
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-build-${{ needs.test.outputs.version }}-${{ github.sha }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 7

  release:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    needs: [filter, lint, test, sonar]
    if: needs.filter.outputs.code == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  status:
    name: CI/CD Status
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    if: always()
    needs: [filter, lint, test, sonar, artifact, release]
    steps:
      - name: Check for failures
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled') ||
          (needs.filter.result == 'skipped')
        run: exit 1
      - name: Success
        run: echo "All required checks passed or were appropriately skipped"
