name: CI/CD

on:
  push:
    branches: [main, master, '**']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  CI:
    uses: firstsun-dev/general-workflows/.github/workflows/obsidian-plugin-ci.yml@main
    with:
      plugin-id: "watermark-s3-uploader"
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
