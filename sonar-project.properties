sonar.projectKey=watermark-s3-uploader
sonar.organization=firstsun-dev
sonar.host.url=https://sonarcloud.io
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=main.js, styles.css, node_modules/**, .claude/**, dist/**, *.config.*
sonar.coverage.exclusions=src/main.ts, src/settings.ts
sonar.verbose=true
