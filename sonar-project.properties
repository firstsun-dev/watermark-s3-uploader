sonar.projectKey=firstsun-dev_watermark-s3-uploader
sonar.organization=firstsun-dev

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=watermark-s3-uploader
sonar.projectVersion=1.1.0

# Path is relative to the sonar-project.properties file.
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts

# Encoding of the source code.
sonar.sourceEncoding=UTF-8

# Coverage reporting
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=main.js, styles.css, node_modules/**, .claude/**, dist/**, *.config.*, repomix-output.md
sonar.coverage.exclusions=src/main.ts, src/settings.ts

sonar.verbose=true
